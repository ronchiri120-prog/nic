version: "3.9"

# ═══════════════════════════════════════════════════════════
#  QuickLender — Docker Compose (Phase 3)
#  Start everything: docker-compose up --build
# ═══════════════════════════════════════════════════════════

services:

  # ─── PostgreSQL 15 ────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: ql_postgres
    environment:
      POSTGRES_DB:       quicklender_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ql_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Redis 7 (Celery broker + result backend) ─────────
  redis:
    image: redis:7-alpine
    container_name: ql_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - ql_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Django API ───────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ql_api
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_demo_data &&
             python manage.py collectstatic --noinput &&
             gunicorn quicklender_project.wsgi:application
               --bind 0.0.0.0:8000
               --workers 3
               --timeout 120
               --access-logfile -"
    volumes:
      - ./backend:/app
      - ql_media:/app/media
      - ql_static:/app/staticfiles
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DB_HOST:    db
      REDIS_URL:  redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/auth/login/"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── Celery Worker (async tasks: SMS, email, M-Pesa) ──
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ql_worker
    command: celery -A quicklender_project worker
               --loglevel=info
               --concurrency=4
               --queues=celery,notifications,mpesa
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      DB_HOST:   db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  # ─── Celery Beat (scheduled tasks) ────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ql_beat
    command: celery -A quicklender_project beat
               --loglevel=info
               --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      DB_HOST:   db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
      - worker

  # ─── Frontend (Nginx) ─────────────────────────────────
  frontend:
    image: nginx:1.25-alpine
    container_name: ql_frontend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ql_static:/usr/share/nginx/html/static:ro
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  ql_postgres_data:
  ql_redis_data:
  ql_media:
  ql_static:
