; ═══════════════════════════════════════════════════════════════════════
;  PgBouncer — Connection Pooling for QuickLender
;  Install: apt install pgbouncer
;  Config:  /etc/pgbouncer/pgbouncer.ini
; ═══════════════════════════════════════════════════════════════════════

[databases]
; Proxy quicklender_db → PostgreSQL
quicklender_db = host=127.0.0.1 port=5432 dbname=quicklender_db

[pgbouncer]
; Listen on port 6432 — Django connects to this port
listen_port    = 6432
listen_addr    = 127.0.0.1

; Pool mode: transaction is best for Django
pool_mode      = transaction
max_client_conn= 200
default_pool_size = 20
min_pool_size  = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

; Authentication
auth_type      = md5
auth_file      = /etc/pgbouncer/userlist.txt

; Connection limits
server_idle_timeout = 600
client_idle_timeout = 0
server_lifetime     = 3600

; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors  = 1
logfile = /var/log/pgbouncer/pgbouncer.log
pidfile = /var/run/pgbouncer/pgbouncer.pid

; Admin
admin_users = postgres
stats_users = postgres

; With pgbouncer, update Django DB settings:
;   DB_HOST=127.0.0.1
;   DB_PORT=6432     (pgbouncer port, not 5432)
;   CONN_MAX_AGE=0   (let pgbouncer handle pooling)
