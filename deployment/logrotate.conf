# QuickLender log rotation
# Install: sudo cp logrotate.conf /etc/logrotate.d/quicklender

/var/log/quicklender/*.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    create 640 quicklender adm
    sharedscripts
    postrotate
        systemctl reload quicklender-api 2>/dev/null || true
    endscript
}

/var/log/nginx/quicklender*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    sharedscripts
    postrotate
        nginx -s reopen 2>/dev/null || true
    endscript
}

/var/log/pgbouncer/*.log {
    weekly
    missingok
    rotate 8
    compress
    delaycompress
    notifempty
}
