# ═══════════════════════════════════════════════════════════
#  QuickLender — Production Nginx
#  Place: /etc/nginx/sites-available/quicklender
#  Enable: ln -s /etc/nginx/sites-available/quicklender /etc/nginx/sites-enabled/
# ═══════════════════════════════════════════════════════════

limit_req_zone  $binary_remote_addr zone=api:10m     rate=60r/m;
limit_req_zone  $binary_remote_addr zone=login:10m   rate=5r/m;
limit_conn_zone $binary_remote_addr zone=conn:10m;

upstream django { server 127.0.0.1:8000 fail_timeout=0; keepalive 32; }

server {
    listen 80; listen [::]:80;
    server_name quicklender.co.ke www.quicklender.co.ke;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2; listen [::]:443 ssl http2;
    server_name quicklender.co.ke www.quicklender.co.ke;

    ssl_certificate      /etc/letsencrypt/live/quicklender.co.ke/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/quicklender.co.ke/privkey.pem;
    ssl_protocols        TLSv1.2 TLSv1.3;
    ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache    shared:SSL:10m;
    ssl_session_timeout  1d;
    ssl_session_tickets  off;
    ssl_stapling on; ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on; gzip_vary on; gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    limit_conn conn 20;
    client_max_body_size 25M;

    root /var/www/quicklender/frontend;
    index pages/login/login.html;

    location / {
        try_files $uri $uri/ /pages/login/login.html;
        expires 1h;
    }
    location /static/ {
        alias /var/www/quicklender/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    location /media/ {
        internal;
        alias /var/www/quicklender/media/;
    }
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        add_header Access-Control-Allow-Origin  $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Access-Control-Allow-Credentials true always;
        if ($request_method = OPTIONS) { return 204; }
    }
    location /api/v1/auth/login/ {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/v1/payments/mpesa/callback/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /health/ {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
    location ~* \.(php|asp|jsp)$ { return 444; }
    location ~ /\.                { return 444; }

    access_log /var/log/nginx/quicklender.access.log combined;
    error_log  /var/log/nginx/quicklender.error.log warn;
}
