groups:
  - name: quicklender.alerts
    interval: 30s
    rules:

      # API down
      - alert: QuickLenderAPIDown
        expr: up{job="quicklender-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "QuickLender API is DOWN"
          description: "Django API has been unreachable for > 1 minute."

      # High error rate
      - alert: HighAPIErrorRate
        expr: rate(django_http_responses_total_by_status_code_view_method_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate"
          description: "More than 5% of API requests are failing."

      # Celery worker down
      - alert: CeleryWorkerDown
        expr: celery_workers == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "No Celery workers running"
          description: "SMS, email, and M-Pesa tasks will not be processed."

      # Database connection pool exhausted
      - alert: DBConnectionsHigh
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connections near limit"

      # Disk space
      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk space below 15% on {{ $labels.mountpoint }}"

      # Failed SMS backlog
      - alert: SMSFailureSpike
        expr: increase(ql_sms_failed_total[10m]) > 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "SMS failure spike"
          description: "More than 20 SMS failures in the last 10 minutes."

      # M-Pesa callback timeout
      - alert: MpesaCallbackTimeout
        expr: increase(ql_mpesa_pending_total[30m]) > 10
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "M-Pesa callbacks not being received"
