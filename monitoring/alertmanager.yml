route:
  group_by: [alertname, severity]
  group_wait:      30s
  group_interval:  5m
  repeat_interval: 12h
  receiver: quicklender-team
  routes:
    - match:
        severity: critical
      receiver: quicklender-critical
      repeat_interval: 1h

receivers:
  - name: quicklender-team
    slack_configs:
      - api_url: ${SLACK_WEBHOOK_URL}
        channel: "#quicklender-alerts"
        title: "QuickLender Alert: {{ .GroupLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.description }}
{{ end }}"
    email_configs:
      - to: devops@quicklender.co.ke
        from: alerts@quicklender.co.ke
        smarthost: smtp.gmail.com:587
        auth_username: ${EMAIL_HOST_USER}
        auth_password: ${EMAIL_HOST_PASSWORD}

  - name: quicklender-critical
    pagerduty_configs:
      - routing_key: ${PAGERDUTY_KEY}
    slack_configs:
      - api_url: ${SLACK_WEBHOOK_URL}
        channel: "#quicklender-critical"
        title: "🚨 CRITICAL: {{ .GroupLabels.alertname }}"
        color: "danger"
