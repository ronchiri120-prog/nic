<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M-Pesa Integration — QuickLender</title>
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/topbar.css">
  <link rel="stylesheet" href="mpesa.css">
</head>
<body>
  <div id="sidebar-mount"></div>
  <div class="app-main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="page-title">M-Pesa Integration</div>
        <div class="breadcrumb"><span class="breadcrumb-sep">/</span> Finance · M-Pesa</div>
      </div>
      <div class="topbar-right" id="topbarActions"></div>
    </div>
    <div class="content-area">
      
      <div class="grid-2 mb-24">
        <div class="panel">
          <div class="panel-header"><div class="panel-title">📤 B2C Disbursement</div></div>
          <div class="panel-body">
            <div class="form-group"><label class="form-label">Customer Phone</label><input class="form-control" id="b2cPhone" placeholder="254 7XX XXX XXX"></div>
            <div class="form-group"><label class="form-label">Amount (KES)</label><input type="number" class="form-control" id="b2cAmount" placeholder="0.00"></div>
            <div class="form-group"><label class="form-label">Loan Reference</label><input class="form-control" id="b2cRef" placeholder="QL-L0001"></div>
            <button class="btn btn-primary btn-full" onclick="b2cDisburse()">⚡ Initiate B2C Transfer</button>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header"><div class="panel-title">📲 STK Push (Collect)</div></div>
          <div class="panel-body">
            <div class="form-group"><label class="form-label">Customer Phone</label><input class="form-control" id="stkPhone" placeholder="254 7XX XXX XXX"></div>
            <div class="form-group"><label class="form-label">Amount (KES)</label><input type="number" class="form-control" id="stkAmount" placeholder="0.00"></div>
            <div class="form-group"><label class="form-label">Account Reference</label><input class="form-control" id="stkRef" placeholder="Loan account number"></div>
            <button class="btn btn-full btn btn-gold" onclick="stkPush()">📲 Send STK Push</button>
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header"><div class="panel-title">🔄 Recent M-Pesa Transactions</div></div>
        <div class="panel-body-bare">
          <table class="data-table">
            <thead><tr><th>Timestamp</th><th>Type</th><th>Phone</th><th>Amount</th><th>M-Pesa Code</th><th>Loan Ref</th><th>Status</th></tr></thead>
            <tbody id="mpesaTbody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
  <div id="toast-container"></div>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/utils.js"></script>
  <script src="mpesa.js"></script>
</body>
</html>
