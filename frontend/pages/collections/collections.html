<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collections CRM — QuickLender</title>
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/topbar.css">
  <link rel="stylesheet" href="collections.css">
</head>
<body>
  <div id="sidebar-mount"></div>
  <div class="app-main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="page-title">Collections CRM</div>
        <div class="breadcrumb"><span class="breadcrumb-sep">/</span> Operations · Collections</div>
      </div>
      <div class="topbar-right" id="topbarActions"></div>
    </div>
        <div class="content-area">
      <div class="kpi-grid animate-fadeup" >
        <div class="kpi-card kc-red"><div class="kpi-label">Total Overdue</div><div class="kpi-value" id="collCount">—</div></div>
        <div class="kpi-card kc-gold"><div class="kpi-label">At Risk Balance</div><div class="kpi-value text-2xl" id="kpi-coll-at-risk">—</div></div>
        <div class="kpi-card kc-blue"><div class="kpi-label">Calls Today</div><div class="kpi-value">—</div></div>
        <div class="kpi-card kc-green"><div class="kpi-label">Recovered MTD</div><div class="kpi-value text-2xl">—</div></div>
      </div>
      <div class="panel animate-fadeup stagger-1">
        <div class="panel-header"><div class="panel-title">📞 Collections Queue</div></div>
        <div class="panel-body-bare">
          <table class="data-table">
            <thead><tr><th>Loan</th><th>Customer</th><th>Phone</th><th>Balance</th><th>Days OD</th><th>Due Date</th><th>Officer</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="collTbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  </div>
  <div id="toast-container"></div>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/utils.js"></script>
  <script src="collections.js"></script>
</body>
</html>
