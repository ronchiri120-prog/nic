<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Applications — QuickLender</title>
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/topbar.css">
  <link rel="stylesheet" href="applications.css">
</head>
<body>
  <div id="sidebar-mount"></div>
  <div class="app-main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="page-title">Applications</div>
        <div class="breadcrumb"><span class="breadcrumb-sep">/</span> Loan Applications</div>
      </div>
      <div class="topbar-right" id="topbarActions"></div>
    </div>
        <div class="content-area">
      <div class="kpi-grid animate-fadeup kpi-grid kpi-grid-4 animate-fadeup" id="appKPIs">
        <div class="kpi-card kc-gold"><div class="kpi-label">Pending Review</div><div class="kpi-value" id="kpi-pending">—</div></div>
        <div class="kpi-card kc-green"><div class="kpi-label">Approved Today</div><div class="kpi-value" id="kpi-approved">—</div></div>
        <div class="kpi-card kc-red"><div class="kpi-label">Rejected Today</div><div class="kpi-value" id="kpi-rejected">—</div></div>
        <div class="kpi-card kc-blue"><div class="kpi-label">Avg Credit Score</div><div class="kpi-value" id="kpi-score">—</div></div>
      </div>
      <div class="panel animate-fadeup stagger-1">
        <div class="panel-header">
          <div class="panel-title">📋 Loan Applications</div>
          <span class="badge badge-pending" id="appCount">—</span>
        </div>
        <div class="panel-body-bare">
          <table class="data-table">
            <thead><tr>
              <th>Loan ID</th><th>Customer</th><th>Type</th><th>Amount</th>
              <th>Credit Score</th><th>Loan Officer</th><th>Submitted</th><th>Status</th><th>Actions</th>
            </tr></thead>
            <tbody id="appTbody"></tbody>
          </table>
        </div>
      </div>
    </div>
    <div id="toast-container"></div>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/utils.js"></script>
  <script src="applications.js"></script>
</body>
</html>
