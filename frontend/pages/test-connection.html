<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickLender — Backend Connection Test</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:#07090f; color:#e4e8f0; font-family:'Courier New',monospace; padding:32px; font-size:13px; }
    h1  { color:#22d3a0; font-size:20px; margin-bottom:24px; }
    .panel { background:#0d1017; border:1px solid #1e2535; border-radius:10px; padding:20px; margin-bottom:16px; }
    .test { display:flex; align-items:center; gap:12px; padding:8px 0; border-bottom:1px solid #1e2535; }
    .test:last-child { border-bottom:none; }
    .dot  { width:10px; height:10px; border-radius:50%; flex-shrink:0; background:#4a5568; }
    .dot.ok  { background:#22d3a0; box-shadow:0 0 6px rgba(34,211,160,0.5); }
    .dot.err { background:#f06060; box-shadow:0 0 6px rgba(240,96,96,0.5); }
    .dot.loading { background:#f0b429; animation:pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
    .label { flex:1; font-weight:600; }
    .detail { color:#8b95a8; font-size:11px; max-width:400px; word-break:break-all; }
    .time   { color:#4a5568; font-size:10px; min-width:60px; text-align:right; }
    button  { background:#22d3a0; color:#07090f; border:none; border-radius:6px; padding:10px 20px;
              font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; }
    button:hover { background:#0ea271; }
    .summary { margin-top:20px; padding:16px; border-radius:8px; text-align:center; font-size:14px; font-weight:700; }
    .summary.pass { background:rgba(34,211,160,0.1); border:1px solid rgba(34,211,160,0.3); color:#22d3a0; }
    .summary.fail { background:rgba(240,96,96,0.1); border:1px solid rgba(240,96,96,0.3); color:#f06060; }
  </style>
</head>
<body>
  <h1>⚡ QuickLender — Backend Connection Test</h1>

  <div class="panel">
    <div class="d-flex justify-between items-center mb-16">
      <div class="text-muted-hex">Tests each API endpoint and reports status</div>
      <button onclick="runAll()">▶ Run All Tests</button>
    </div>
    <div id="tests"></div>
    <div id="summary"></div>
  </div>

  <div class="panel text-sm text-dark-hex">
    <div class="text-muted-hex mb-8">API Base URL: <span id="apiBase" class="text-brand-hex"></span></div>
    <div>If tests fail with <b>Network Error</b>: the Django backend is not running.<br>
    Start it: <span class="text-brand-hex">cd backend && python manage.py runserver</span></div>
  </div>

  <script>
const BASE = window.location.port === '3000' ? '/api/v1' : 'http://localhost:8000/api/v1';
document.getElementById('apiBase').textContent = BASE;

const TESTS = [
  { name: 'Health — API reachable',  url: '/auth/login/', method:'POST', body:{email:'test',password:'test'}, expectStatus:[200,400,401] },
  { name: 'Auth — Login endpoint',   url: '/auth/login/', method:'POST', body:{email:'admin@quicklender.co.ke',password:'QuickLender@2026'}, expectStatus:[200], saveToken:true },
  { name: 'Auth — Get current user', url: '/auth/me/',    method:'GET',  needsAuth:true, expectStatus:[200] },
  { name: 'Auth — Dashboard stats',  url: '/auth/dashboard/stats/', method:'GET', needsAuth:true, expectStatus:[200] },
  { name: 'Branches — List',         url: '/branches/',   method:'GET',  needsAuth:true, expectStatus:[200] },
  { name: 'Customers — List',        url: '/customers/',  method:'GET',  needsAuth:true, expectStatus:[200] },
  { name: 'Loans — Products',        url: '/loans/products/', method:'GET', needsAuth:true, expectStatus:[200] },
  { name: 'Loans — List',            url: '/loans/',      method:'GET',  needsAuth:true, expectStatus:[200] },
  { name: 'Payments — List',         url: '/payments/',   method:'GET',  needsAuth:true, expectStatus:[200] },
  { name: 'M-Pesa — Transactions',   url: '/payments/mpesa/transactions/', method:'GET', needsAuth:true, expectStatus:[200] },
  { name: 'Reports — Branch Perf',   url: '/reports/branch-performance/', method:'GET', needsAuth:true, expectStatus:[200] },
  { name: 'Reports — Defaulters',    url: '/reports/defaulters/',          method:'GET', needsAuth:true, expectStatus:[200] },
  { name: 'Staff — User list',       url: '/auth/users/', method:'GET',  needsAuth:true, expectStatus:[200] },
  { name: 'Allocations — List',      url: '/allocations/', method:'GET', needsAuth:true, expectStatus:[200] },
  { name: 'Assets — List',           url: '/assets/',     method:'GET',  needsAuth:true, expectStatus:[200] },
  { name: 'API Docs — Swagger',      url: '/../docs/',    method:'GET',  expectStatus:[200,301,302] },
];

let token = null;
let pass = 0, fail = 0;

function render() {
  document.getElementById('tests').innerHTML = TESTS.map((t, i) => `
    <div class="test" id="test-${i}">
      <div class="dot loading" id="dot-${i}"></div>
      <div class="label">${t.name}</div>
      <div class="detail" id="detail-${i}">waiting…</div>
      <div class="time" id="time-${i}"></div>
    </div>`).join('');
}

async function runTest(t, i) {
  const dot    = document.getElementById(`dot-${i}`);
  const detail = document.getElementById(`detail-${i}`);
  const time   = document.getElementById(`time-${i}`);
  dot.className = 'dot loading';
  detail.textContent = 'running…';

  const start = Date.now();
  try {
    const headers = { 'Content-Type': 'application/json' };
    if (t.needsAuth && token) headers['Authorization'] = `Bearer ${token}`;

    const resp = await fetch(BASE + t.url, {
      method: t.method,
      headers,
      body: t.body ? JSON.stringify(t.body) : undefined,
    });

    const ms = Date.now() - start;
    time.textContent = `${ms}ms`;

    const ok = t.expectStatus.includes(resp.status);
    dot.className = 'dot ' + (ok ? 'ok' : 'err');

    let body = '';
    try { const j = await resp.json(); body = j?.count !== undefined ? `${j.count} records` : j?.detail || JSON.stringify(j).slice(0,60); } catch{}

    if (ok) {
      detail.textContent = `HTTP ${resp.status} — ${body}`;
      pass++;
      if (t.saveToken && body) {
        // Try to get token from full response
        try {
          const fullResp = await fetch(BASE + t.url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(t.body) });
          const d = await fullResp.json();
          if (d.access) { token = d.access; detail.textContent += ' ✓ token saved'; }
        } catch {}
      }
    } else {
      detail.textContent = `HTTP ${resp.status} — expected ${t.expectStatus.join(' or ')} — ${body}`;
      fail++;
    }
  } catch (e) {
    const ms = Date.now() - start;
    time.textContent = `${ms}ms`;
    dot.className = 'dot err';
    detail.textContent = e.message.includes('fetch') ? '❌ Network Error — backend unreachable' : e.message;
    fail++;
  }
}

async function runAll() {
  pass = 0; fail = 0; token = null;
  render();
  document.getElementById('summary').innerHTML = '';
  for (let i = 0; i < TESTS.length; i++) {
    await runTest(TESTS[i], i);
    await new Promise(r => setTimeout(r, 80));
  }
  const total = TESTS.length;
  const el = document.getElementById('summary');
  el.className = 'summary ' + (fail === 0 ? 'pass' : 'fail');
  el.textContent = fail === 0
    ? `✓ All ${total} tests passed — backend fully operational`
    : `${fail} of ${total} tests failed — check backend connection`;
}

// Auto-run on load
render();
setTimeout(runAll, 300);
  </script>
</body>
</html>
