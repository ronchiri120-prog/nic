<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Groups & Chamas — QuickLender</title>
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/topbar.css">
  <link rel="stylesheet" href="groups.css">
</head>
<body>
  <div id="sidebar-mount"></div>
  <div class="app-main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="page-title">Groups & Chamas</div>
        <div class="breadcrumb"><span class="breadcrumb-sep">/</span> Group Lending</div>
      </div>
      <div class="topbar-right" id="topbarActions">
        <div class="topbar-search">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Search groups…" oninput="onSearch(this)">
        </div>
        <button class="btn btn-primary" onclick="Modal.open('modal-new-group')">+ New Group</button>
      </div>
    </div>
    <div class="content-area" id="pageContent"></div>
  </div>

  <div id="toast-container"></div>

  <!-- New Group Modal -->
  <div class="modal-overlay" id="modal-new-group">
    <div class="modal modal-md">
      <div class="modal-header">
        <div class="modal-title">👥 Create Group / Chama</div>
        <div class="modal-close" onclick="Modal.close('modal-new-group')">✕</div>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Group Name *</label>
            <input class="form-control" id="grp-name" placeholder="e.g. Umoja Women Group">
          </div>
          <div class="form-group">
            <label class="form-label">Type *</label>
            <select class="form-control" id="grp-type">
              <option value="CHAMA">Chama</option>
              <option value="SACCO">SACCO</option>
              <option value="SELF_HELP">Self-Help Group</option>
              <option value="COOPERATIVE">Cooperative</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Branch *</label>
            <select class="form-control" id="grp-branch"></select>
          </div>
          <div class="form-group">
            <label class="form-label">Meeting Day</label>
            <select class="form-control" id="grp-day">
              <option value="">Select…</option>
              <option value="MON">Monday</option>
              <option value="TUE">Tuesday</option>
              <option value="WED">Wednesday</option>
              <option value="THU">Thursday</option>
              <option value="FRI">Friday</option>
              <option value="SAT">Saturday</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-control" id="grp-desc" rows="2" placeholder="Group purpose, location…"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="Modal.close('modal-new-group')">Cancel</button>
        <button class="btn btn-primary" id="saveGroupBtn" onclick="saveGroup()">
          <span class="btn-label">Create Group</span><span class="btn-spinner"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- Add Member Modal -->
  <div class="modal-overlay" id="modal-add-member">
    <div class="modal modal-md">
      <div class="modal-header">
        <div class="modal-title">👤 Add Group Member</div>
        <div class="modal-close" onclick="Modal.close('modal-add-member')">✕</div>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Customer Search *</label>
          <input class="form-control" id="member-search"
            placeholder="Type name, ID, or phone…"
            oninput="searchCustomer(this.value)">
          <div id="member-results" class="mt-8"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Role in Group</label>
          <select class="form-control" id="member-role">
            <option value="MEMBER">Member</option>
            <option value="CHAIRPERSON">Chairperson</option>
            <option value="SECRETARY">Secretary</option>
            <option value="TREASURER">Treasurer</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Share Amount (KES)</label>
          <input type="number" class="form-control" id="member-share" placeholder="0" min="0">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="Modal.close('modal-add-member')">Cancel</button>
        <button class="btn btn-primary" id="addMemberBtn" onclick="addMember()">
          <span class="btn-label">Add Member</span><span class="btn-spinner"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- Group Loan Modal -->
  <div class="modal-overlay" id="modal-group-loan">
    <div class="modal modal-md">
      <div class="modal-header">
        <div class="modal-title">💰 Group Loan Application</div>
        <div class="modal-close" onclick="Modal.close('modal-group-loan')">✕</div>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Total Loan Amount (KES) *</label>
            <input type="number" class="form-control" id="gl-amount" placeholder="0" min="1000"
              oninput="calcGroupShares()">
          </div>
          <div class="form-group">
            <label class="form-label">Loan Product *</label>
            <select class="form-control" id="gl-product"></select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Purpose</label>
          <textarea class="form-control" id="gl-purpose" rows="2" placeholder="Group loan purpose…"></textarea>
        </div>
        <div id="gl-share-preview" class="upload-hint mt-8"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="Modal.close('modal-group-loan')">Cancel</button>
        <button class="btn btn-primary" id="applyGroupLoanBtn" onclick="applyGroupLoan()">
          <span class="btn-label">Submit Application</span><span class="btn-spinner"></span>
        </button>
      </div>
    </div>
  </div>


  <!-- View Group Detail Modal -->
  <div class="modal-overlay" id="modal-view-group">
    <div class="modal group-detail-modal">
      <div class="modal-header modal-header-sticky">
        <div>
          <div class="modal-title" id="vg-title">Group Details</div>
        </div>
        <div class="modal-close" onclick="Modal.close('modal-view-group')">✕</div>
      </div>
      <div class="modal-body" id="vg-body">
        <!-- Filled by viewGroup() -->
      </div>
      <div class="modal-footer sticky-bottom-modal">
        <button class="btn btn-ghost" onclick="Modal.close('modal-view-group')">Close</button>
      </div>
    </div>
  </div>

  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/utils.js"></script>
  <script src="groups.js"></script>
</body>
</html>
