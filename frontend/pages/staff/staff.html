<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff & Roles — QuickLender</title>
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/topbar.css">
  <link rel="stylesheet" href="staff.css">
</head>
<body>
  <div id="sidebar-mount"></div>
  <div class="app-main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="page-title">Staff & Roles</div>
        <div class="breadcrumb"><span class="breadcrumb-sep">/</span> System · Staff</div>
      </div>
      <div class="topbar-right" id="topbarActions"></div>
    </div>
    <div class="content-area">
      
      <div class="panel mb-24 animate-fadeup">
        <div class="panel-header"><div class="panel-title">👥 System Users</div></div>
        <div class="panel-body-bare">
          <table class="data-table">
            <thead><tr><th>ID</th><th>Name</th><th>Role</th><th>Branch</th><th>Region</th><th>Email</th><th>Status</th><th>Last Login</th><th>Actions</th></tr></thead>
            <tbody id="staffTbody"></tbody>
          </table>
        </div>
      </div>
      <div class="panel animate-fadeup stagger-1">
        <div class="panel-header"><div class="panel-title">🔐 Role Permissions Matrix</div></div>
        <div class="panel-body overflow-x-auto">
          <table class="data-table">
            <thead><tr><th>Module</th><th>Super Admin</th><th>Regional Mgr</th><th>Branch Mgr</th><th>RO</th><th>BA</th><th>Collections Mgr</th><th>Marketing</th><th>HOP</th><th>Accountant</th></tr></thead>
            <tbody id="permsTbody"></tbody>
          </table>
        </div>
      </div>
      <div class="modal-overlay" id="modal-new-staff">
        <div class="modal modal-md">
          <div class="modal-header"><div class="modal-title">👤 Add Staff Member</div><div class="modal-close" onclick="Modal.close('modal-new-staff')">✕</div></div>
          <div class="modal-body">
            <form id="newStaffForm">
            <div class="form-grid">
              <div class="form-group"><label class="form-label">Full Name *</label>
                <input class="form-control" name="full_name" placeholder="Full name" required></div>
              <div class="form-group"><label class="form-label">Email *</label>
                <input class="form-control" name="email" type="email" placeholder="name@quicklender.co.ke" required></div>
              <div class="form-group"><label class="form-label">Phone *</label>
                <input class="form-control" name="phone" placeholder="07XX XXX XXX" required></div>
              <div class="form-group"><label class="form-label">National ID</label>
                <input class="form-control" name="national_id" placeholder="ID / Passport number"></div>
              <div class="form-group"><label class="form-label">Role *</label>
                <select class="form-control" name="role" title="Staff Role" required>
                  <option value="">Select role…</option>
                  <option value="RM">Regional Manager</option>
                  <option value="BDO">Business Development Officer</option>
                  <option value="IDC">IDC Credit Officer</option>
                  <option value="VERIFICATION_TEAM">Verification Team</option>
                  <option value="PAYMENT_OFFICER">Payment Officer</option>
                  <option value="DISBURSEMENT_OFFICER">Disbursement Officer</option>
                  <option value="COLLECTIONS_MGR">Collections Manager</option>
                  <option value="EDC_MANAGER">EDC Manager</option>
                  <option value="FA_MANAGER">FA Manager</option>
                  <option value="CC_MANAGER">CC Manager</option>
                  <option value="EXTERNAL_DEBT_COLLECTOR">External Debt Collector</option>
                  <option value="FIELD_AGENT">Field Agent</option>
                  <option value="CALL_CENTRE">Call Centre</option>
                  <option value="READ_ONLY">Viewer Only</option>
                  <option value="FINANCE">Finance</option>
                  <option value="COLLECTIONS">Collections Officer</option>
                  <option value="LOAN_OFFICER">Loan Officer</option>
                  <option value="OPERATIONS">Operations</option>
                  <option value="TECH">Tech Department</option>
                  <option value="BRANCH_MANAGER">Branch Manager</option>
                  <option value="FRONT_OFFICE">Front Office</option>
                  <option value="ADMIN">Admin</option>
                  <option value="SUPER_ADMIN">Super Admin</option>
                </select></div>
              <div class="form-group"><label class="form-label">Branch *</label>
                <select class="form-control" name="branch" id="staffBranchSel" title="Staff Branch" required>
                  <option value="">Select branch…</option>
                </select></div>
              <div class="form-group"><label class="form-label">Region</label>
                <select class="form-control" name="region" id="staffRegionSel" title="Staff Region">
                  <option value="">No region assigned</option>
                </select></div>
              <div class="form-group"><label class="form-label">Temporary Password *</label>
                <input class="form-control" type="password" name="password" placeholder="Min. 8 characters" required></div>
              <div class="form-group"><label class="form-label">Disbursement Target (KES)</label>
                <input type="number" class="form-control" name="disbursement_target" placeholder="0"></div>
            </div>
          </div>
          </form>
          <div class="modal-footer">
            <button class="btn btn-ghost" onclick="Modal.close('modal-new-staff')">Cancel</button>
            <button class="btn btn-primary" id="saveStaffBtn" onclick="saveStaff()"><span class="btn-label">Add Staff</span><span class="btn-spinner"></span></button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Edit Staff Modal -->
  <div class="modal-overlay" id="modal-edit-staff">
    <div class="modal modal-md">
      <div class="modal-header">
        <div class="modal-title">✏️ Edit Staff Member</div>
        <div class="modal-close" onclick="Modal.close('modal-edit-staff')">✕</div>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editStaffId">
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Full Name *</label>
            <input class="form-control" id="editStaffName" placeholder="Full name">
          </div>
          <div class="form-group">
            <label class="form-label">Email *</label>
            <input class="form-control" id="editStaffEmail" type="email" placeholder="email@company.co.ke">
          </div>
          <div class="form-group">
            <label class="form-label">Role *</label>
            <select class="form-control" id="editStaffRole" title="Staff Role">
              <option value="RM">Regional Manager</option>
              <option value="BDO">Business Development Officer</option>
              <option value="IDC">IDC Credit Officer</option>
              <option value="VERIFICATION_TEAM">Verification Team</option>
              <option value="PAYMENT_OFFICER">Payment Officer</option>
              <option value="DISBURSEMENT_OFFICER">Disbursement Officer</option>
              <option value="COLLECTIONS_MGR">Collections Manager</option>
              <option value="EDC_MANAGER">EDC Manager</option>
              <option value="FA_MANAGER">FA Manager</option>
              <option value="CC_MANAGER">CC Manager</option>
              <option value="EXTERNAL_DEBT_COLLECTOR">External Debt Collector</option>
              <option value="FIELD_AGENT">Field Agent</option>
              <option value="CALL_CENTRE">Call Centre</option>
              <option value="READ_ONLY">Viewer Only</option>
              <option value="FINANCE">Finance</option>
              <option value="COLLECTIONS">Collections Officer</option>
              <option value="LOAN_OFFICER">Loan Officer</option>
              <option value="OPERATIONS">Operations</option>
              <option value="TECH">Tech Department</option>
              <option value="BRANCH_MANAGER">Branch Manager</option>
              <option value="FRONT_OFFICE">Front Office</option>
              <option value="ADMIN">Admin</option>
              <option value="SUPER_ADMIN">Super Admin</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Branch</label>
            <select class="form-control" id="editStaffBranch" title="Staff Branch">
              <option value="">No branch</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Region</label>
            <select class="form-control" id="editStaffRegion" title="Staff Region">
              <option value="">No region assigned</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Phone</label>
            <input class="form-control" id="editStaffPhone" placeholder="07XXXXXXXX">
          </div>
          <div class="form-group">
            <label class="form-label">Target (KES/month)</label>
            <input class="form-control" type="number" id="editStaffTarget" placeholder="0">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">New Password <span class="text-dim text-xs">(leave blank to keep current)</span></label>
          <input class="form-control" id="editStaffPw" type="password" placeholder="Leave blank to keep current">
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-control" id="editStaffActive" title="Staff Status">
            <option value="true">Active</option>
            <option value="false">Deactivated</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger btn-sm" id="deactivateStaffBtn" onclick="toggleStaffActive()">
          <span class="btn-label">Deactivate</span><span class="btn-spinner"></span>
        </button>
        <button class="btn btn-ghost" onclick="Modal.close('modal-edit-staff')">Cancel</button>
        <button class="btn btn-primary" id="updateStaffBtn" onclick="updateStaff()">
          <span class="btn-label">Save Changes</span><span class="btn-spinner"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- Reset Password Modal -->
  <div class="modal-overlay" id="modal-reset-pw">
    <div class="modal modal-sm">
      <div class="modal-header">
        <div class="modal-title">🔑 Reset Password</div>
        <div class="modal-close" onclick="Modal.close('modal-reset-pw')">✕</div>
      </div>
      <div class="modal-body">
        <input type="hidden" id="resetPwStaffId">
        <p class="text-sm text-dim mb-16">Set a new password for <b id="resetPwStaffName"></b>.</p>
        <div class="form-group">
          <label class="form-label">New Password *</label>
          <input class="form-control" id="newStaffPw" type="password" placeholder="Min 8 characters">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password *</label>
          <input class="form-control" id="confirmStaffPw" type="password" placeholder="Repeat password">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="Modal.close('modal-reset-pw')">Cancel</button>
        <button class="btn btn-primary" id="saveNewPwBtn" onclick="saveResetPw()">
          <span class="btn-label">Set Password</span><span class="btn-spinner"></span>
        </button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/utils.js"></script>
  <script src="staff.js"></script>
</body>
</html>
